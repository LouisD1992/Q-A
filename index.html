<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nha Khoa Sao Việt</title>
    <script>
      // Mitigation for "Uncaught TypeError: Cannot redefine property: ethereum"
      // This error is typically caused by browser extensions (like MetaMask) 
      // trying to inject window.ethereum multiple times in an iframe environment.
      try {
        if (!window.ethereum) {
          Object.defineProperty(window, 'ethereum', {
            value: undefined,
            writable: true,
            configurable: true
          });
        }
      } catch (e) {}

      // Silence the error if it still occurs
      window.addEventListener('error', (event) => {
        if (event.message && event.message.includes('Cannot redefine property: ethereum')) {
          event.preventDefault();
          console.warn('Silenced browser extension conflict (ethereum property).');
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
